    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Angels of Comfort" />

    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />

  <meta name="twitter:title" content="Angels of Comfort – Home Care Workforce">

  <meta name="twitter:description" content="Compassionate home care workforce management for caregivers and agencies.">
</head>

  <body>
    <div id="root">
      <div id="pwa-splash" style="
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0a1a24;
        z-index: 9999;
        padding: 2rem;
      ">
        <img
          src="/favicon.png"
          alt="Angels of Comfort"
          style="width: 240px; max-width: 70vw; height: auto; object-fit: contain; animation: aoc-splash-pulse 1.8s ease-in-out infinite;"
        />
        <p style="
          margin-top: 1.25rem;
          font-family: 'Inter', system-ui, sans-serif;
          font-size: 0.8125rem;
          color: rgba(207, 152, 89, 0.65);
          letter-spacing: 0.04em;
        ">Compassionate Home Care</p>
        <div style="
          margin-top: 2.5rem;
          width: 32px;
          height: 32px;
          border: 2px solid rgba(207, 152, 89, 0.2);
          border-top-color: #cf9859;
          border-radius: 50%;
          animation: aoc-splash-spin 0.9s linear infinite;
        "></div>
        <style>
          @keyframes aoc-splash-spin { to { transform: rotate(360deg); } }
          @keyframes aoc-splash-pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.85; transform: scale(0.97); }
          }
        </style>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
